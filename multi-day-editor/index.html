<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Journal (Multi-Day Editor)</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 20px;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 20px;
      }

      input[type="number"],
      input[type="text"],
      textarea,
      button {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        font-size: 16px;
        border: 1px solid #000;
      }

      textarea {
        height: 150px;
        resize: vertical;
      }

      button {
        cursor: pointer;
        background-color: #f0f0f0;
        font-weight: bold;
      }

      button:hover {
        background-color: #e0e0e0;
      }

      .dayBlock {
        border: 1px solid #000;
        padding: 15px;
        margin-top: 20px;
        text-align: left;
        background: #fafafa;
      }

      .dayBlock h3 {
        margin-bottom: 10px;
        border-bottom: 1px dashed #ccc;
        padding-bottom: 5px;
      }

      #multiDayOptions {
        margin-bottom: 20px;
        padding: 10px;
        border: 1px solid #ccc;
      }

      footer {
        margin-top: auto;
        padding: 20px;
      }

      @media (max-width: 600px) {
        textarea {
          height: 200px;
        }
      }
    </style>

    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>

  <body>
    <h1>Daily Journal</h1>

    <div id="multiDayOptions">
      <label>Number of days to display (1–14):</label>
      <input type="number" id="multiDayCount" min="1" max="14" value="3" />
      <button id="loadMultiButton">Refresh List</button>
    </div>

    <div id="multiDayContainer"></div>

    <script>
      /* -----------------------------
           CONFIG
      ------------------------------*/
      const SHEET_ID = "1Lu1wccCd8QsLtJP3jsfQXub4tVNXRrnM8lC588SDbTA";
      const RANGE = "2026!A:D";
      const CLIENT_ID = "400130720536-l3dqr1rnpo1m1n7r2liaman6lptt7nk8.apps.googleusercontent.com";
      const SCOPES = "https://www.googleapis.com/auth/spreadsheets";

      let gapiInited = false;
      let tokenClient;
      let journalData = [];

      /* -----------------------------
            EVENTS
      ------------------------------*/
      document.getElementById("loadMultiButton").addEventListener("click", loadMultipleDays);

      /* -----------------------------------------
                GOOGLE API INITIALIZATION
      ------------------------------------------*/
      function gapiLoaded() {
        gapi.load("client", initializeGapiClient);
      }

      async function initializeGapiClient() {
        await gapi.client.init({
          discoveryDocs: ["https://sheets.googleapis.com/$discovery/rest?version=v4"],
        });
        gapiInited = true;
        maybeEnableButtons();
      }

      function gisLoaded() {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: SCOPES,
          callback: () => {
            loadDates();
          },
        });
        maybeEnableButtons();
      }

      function maybeEnableButtons() {
        if (gapiInited && tokenClient) tokenClient.requestAccessToken();
      }

      async function loadDates() {
        try {
          const res = await gapi.client.sheets.spreadsheets.values.get({
            spreadsheetId: SHEET_ID,
            range: RANGE,
          });
          journalData = res.result.values || [];
          // Automatically load the list once data is in
          loadMultipleDays();
        } catch (err) {
          console.error("Error loading dates", err);
        }
      }

      /* -----------------------------------------
                  MULTI-DAY LOGIC
      ------------------------------------------*/
      function loadMultipleDays() {
        const count = Number(document.getElementById("multiDayCount").value);
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const container = document.getElementById("multiDayContainer");
        container.innerHTML = "";

        for (let i = 0; i < count; i++) {
          const d = new Date(today);
          d.setDate(today.getDate() - i);
          const dateStr = d.toISOString().split("T")[0];

          const entry = journalData.find((r) => r[0] === dateStr);
          const title = entry ? entry[1] || "" : "";
          const text = entry ? entry[2] || "" : "";
          const unfinished = entry && entry[3] === "TRUE";

          const block = document.createElement("div");
          block.className = "dayBlock";
          block.innerHTML = `
            <h3>${dateStr}</h3>
            <label>Title:</label>
            <input type="text" class="multiTitle" data-date="${dateStr}" value="${title}">
            <label style="display:block; margin-top:10px;">Entry:</label>
            <textarea class="multiText" data-date="${dateStr}">${text}</textarea>
            <label style="display:block; margin-top:10px;">
              <input type="checkbox" class="multiCheck" data-date="${dateStr}" ${unfinished ? "checked" : ""}>
              Mark as Unfinished
            </label>
          `;
          container.appendChild(block);
        }

        const saveBtn = document.createElement("button");
        saveBtn.textContent = "SAVE ALL CHANGES";
        saveBtn.style = "margin: 30px 0; padding: 20px; background: #000; color: #fff;";
        saveBtn.onclick = saveAllMultiEntries;

        container.appendChild(saveBtn);
      }

      async function saveAllMultiEntries() {
        const titles = document.querySelectorAll(".multiTitle");
        const texts = document.querySelectorAll(".multiText");
        const checks = document.querySelectorAll(".multiCheck");

        const updates = [];

        titles.forEach((titleEl, i) => {
          const date = titleEl.dataset.date;
          const rowIndex = journalData.findIndex((r) => r[0] === date);
          if (rowIndex === -1) return;

          updates.push({
            range: `2026!B${rowIndex + 1}:D${rowIndex + 1}`,
            values: [[
              titleEl.value,
              texts[i].value,
              checks[i].checked ? "TRUE" : "FALSE",
            ]],
          });
        });

        if (updates.length === 0) {
          alert("No valid entries found to update.");
          return;
        }

        try {
          await gapi.client.sheets.spreadsheets.values.batchUpdate({
            spreadsheetId: SHEET_ID,
            resource: {
              valueInputOption: "RAW",
              data: updates,
            },
          });

          // Update local data cache
          updates.forEach((u) => {
            const rowIndex = Number(u.range.match(/B(\d+)/)[1]) - 1;
            journalData[rowIndex][1] = u.values[0][0];
            journalData[rowIndex][2] = u.values[0][1];
            journalData[rowIndex][3] = u.values[0][2];
          });

          alert("Successfully saved all entries!");
        } catch (err) {
          alert("Save failed: " + JSON.stringify(err));
        }
      }

      window.onload = () => {
        gapiLoaded();
        gisLoaded();
      };
    </script>

    <footer>
      <a href="./read">Read</a> | 
      <a href="./status">Status</a>
    </footer>
  </body>
</html>
